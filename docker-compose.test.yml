version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_test_data:/data/db

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/messpro_test
      - JWT_SECRET=messpro-dev-secret
    depends_on:
      - mongodb
    # These limits will be overridden by docker-compose override files in the script
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-1}'
          memory: '${RAM_LIMIT:-1G}'

volumes:
  mongodb_test_data:
